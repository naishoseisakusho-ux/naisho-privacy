<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI秘書 オフライン版 動作検証</title>
<style>
  :root{
    --bg:#0b0d10;
    --panel:#15181d;
    --border:#262b32;
    --text:#e7e9ec;
    --muted:#8a909a;
    --accent:#5ee0c5;
    --accent-dim:#2a4a44;
    --error:#ff6b6b;
    --warn:#e0b85e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px 48px;}
  header{margin-bottom:18px;}
  header h1{font-size:17px;font-weight:600;margin:0 0 4px;letter-spacing:.01em;}
  header p{font-size:13px;color:var(--muted);margin:0;line-height:1.5;}

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
  }
  .card h2{font-size:13px;color:var(--muted);font-weight:600;margin:0 0 10px;text-transform:uppercase;letter-spacing:.06em;}

  .status-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--muted);}
  .dot.ok{background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .dot.bad{background:var(--error);box-shadow:0 0 8px var(--error);}
  .dot.busy{background:var(--warn);animation:pulse 1s infinite ease-in-out;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  .status-text{font-size:13.5px;line-height:1.5;}
  .status-text.bad{color:var(--error);}
  .status-text.ok{color:var(--accent);}

  input[type=file]{
    width:100%;
    font-size:13px;
    color:var(--muted);
    margin-top:4px;
  }
  input[type=file]::file-selector-button{
    background:var(--accent-dim);
    color:var(--accent);
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 12px;
    font-size:13px;
    margin-right:10px;
  }

  .preset-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .preset-btn{
    background:transparent;
    border:1px solid var(--border);
    color:var(--muted);
    border-radius:20px;
    padding:6px 12px;
    font-size:12.5px;
    cursor:pointer;
  }
  .preset-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

  textarea{
    width:100%;
    min-height:120px;
    background:#0e1014;
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    font-size:13.5px;
    padding:10px;
    line-height:1.55;
    resize:vertical;
  }

  .run-btn{
    width:100%;
    margin-top:10px;
    background:var(--accent);
    color:#06140f;
    border:none;
    border-radius:10px;
    padding:12px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .run-btn:disabled{opacity:.4;}

  .meta-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:8px;}

  pre#output{
    white-space:pre-wrap;
    word-break:break-word;
    background:#0e1014;
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px;
    margin-top:10px;
    font-size:13.5px;
    line-height:1.6;
    min-height:60px;
    font-family:inherit;
  }

  #test-section{display:none;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>オフライン版AI秘書 — WebGPU動作検証</h1>
    <p>このページはオンデバイスLLM(Gemma)が実際の端末で動くかを確認するための簡易テストです。本番アプリには使いません。</p>
  </header>

  <div class="card">
    <h2>Step 1 · 環境チェック</h2>
    <div class="status-row">
      <div class="dot" id="gpu-dot"></div>
      <div class="status-text" id="gpu-status">確認中...</div>
    </div>
  </div>

  <div class="card" id="load-card">
    <h2>Step 2 · モデルを読み込む</h2>
    <p style="font-size:12.5px;color:var(--muted);margin:0 0 8px;line-height:1.6;">
      Hugging FaceのLiteRT-LM/Web対応モデル(.task / .litertlm)を端末にダウンロード済みの状態で、ここから選択してください。
      初回は <strong>gemma-3n-E2B-it-int4-Web</strong>(軽量・高速)がおすすめです。
    </p>
    <input type="file" id="model-file" accept=".task,.litertlm,.bin">
    <div class="status-row" style="margin-top:10px;">
      <div class="dot" id="model-dot"></div>
      <div class="status-text" id="model-status">未選択</div>
    </div>
  </div>

  <div class="card" id="test-section">
    <h2>Step 3 · 生成テスト</h2>
    <div class="preset-row">
      <button class="preset-btn active" data-preset="email">メール返信</button>
      <button class="preset-btn" data-preset="minutes">議事録要約</button>
      <button class="preset-btn" data-preset="custom">自由入力</button>
    </div>
    <textarea id="prompt-input"></textarea>
    <button class="run-btn" id="run-btn">生成する</button>
    <div class="meta-row">
      <span id="timing">—</span>
      <span id="token-rate">—</span>
    </div>
    <pre id="output"></pre>
  </div>

</div>

<script type="module">
import { FilesetResolver, LlmInference } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-genai";

const gpuDot = document.getElementById('gpu-dot');
const gpuStatus = document.getElementById('gpu-status');
const modelDot = document.getElementById('model-dot');
const modelStatus = document.getElementById('model-status');
const fileInput = document.getElementById('model-file');
const testSection = document.getElementById('test-section');
const promptInput = document.getElementById('prompt-input');
const runBtn = document.getElementById('run-btn');
const outputEl = document.getElementById('output');
const timingEl = document.getElementById('timing');
const rateEl = document.getElementById('token-rate');

const presets = {
  email: `以下のメールに、丁寧なビジネス調で返信文を作成してください。

【受信メール】
件名:来週の打ち合わせ日程について
お世話になっております。来週の打ち合わせですが、火曜14時または木曜10時でご都合いかがでしょうか。`,
  minutes: `以下は会議の発言ログです。決定事項とToDo(担当者付き)を箇条書きで議事録としてまとめてください。

【発言ログ】
田中:新機能のリリースは来月15日を目標にしましょう。
佐藤:了解です。私の方でテスト計画を今週中に作ります。
田中:広報資料は鈴木さんお願いできますか。
鈴木:承知しました、来週月曜までに準備します。`,
  custom: ``
};

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    promptInput.value = presets[btn.dataset.preset];
  });
});
promptInput.value = presets.email;

function setGpu(state, msg){
  gpuDot.className = 'dot ' + state;
  gpuStatus.className = 'status-text ' + state;
  gpuStatus.textContent = msg;
}
function setModel(state, msg){
  modelDot.className = 'dot ' + state;
  modelStatus.className = 'status-text ' + state;
  modelStatus.textContent = msg;
}

// Step 1: WebGPU availability check
if (!navigator.gpu) {
  setGpu('bad', 'このブラウザはWebGPU未対応です。Android→Chrome最新版 / iOS→Safari最新版でお試しください。');
  fileInput.disabled = true;
} else {
  setGpu('ok', 'WebGPU利用可能です。Step 2でモデルファイルを選択してください。');
}

let llmInference = null;

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  setModel('busy', `読み込み中: ${file.name} (${(file.size/1e9).toFixed(2)}GB)... 初回は数十秒〜数分かかります`);
  runBtn.disabled = true;

  try {
    const genai = await FilesetResolver.forGenAiTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-genai/wasm"
    );
    const modelUrl = URL.createObjectURL(file);

    llmInference = await LlmInference.createFromOptions(genai, {
      baseOptions: { modelAssetPath: modelUrl },
      maxTokens: 1024,
      topK: 40,
      temperature: 0.8,
    });

    setModel('ok', `読み込み完了: ${file.name}`);
    testSection.style.display = 'block';
  } catch (err) {
    setModel('bad', 'モデル読み込み失敗: ' + err.message + '(モデル形式やメモリ不足の可能性があります)');
  }
});

runBtn.addEventListener('click', () => {
  const prompt = promptInput.value.trim();
  if (!prompt || !llmInference) return;

  outputEl.textContent = '';
  timingEl.textContent = '生成中...';
  rateEl.textContent = '—';
  runBtn.disabled = true;

  const start = performance.now();
  let charCount = 0;

  llmInference.generateResponse(prompt, (partial, complete) => {
    outputEl.textContent += partial;
    charCount += partial.length;

    if (complete) {
      const elapsedSec = (performance.now() - start) / 1000;
      timingEl.textContent = `生成時間: ${elapsedSec.toFixed(1)}秒`;
      rateEl.textContent = `約${(charCount/elapsedSec).toFixed(1)}文字/秒`;
      runBtn.disabled = false;
    }
  });
});
</script>
</body>
</html>
